<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prezentacija Stambeno-Poslovnog Objekta - Radava</title>
    <style>
        /* Osnovni stilovi za moderan izgled */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
            text-align: center;
        }

        header {
            background-color: #1a252f;
            color: white;
            padding: 20px 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 24px; }
        p { color: #bdc3c7; margin: 5px 0 0 0; }

        /* Kontrole za izbor sprata */
        .floor-selector {
            margin: 30px auto;
        }

        .btn {
            background-color: #ffffff;
            color: #1a252f;
            border: 2px solid #1a252f;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 10px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn.active, .btn:hover {
            background-color: #1a252f;
            color: white;
        }

        /* Kontejner za interaktivnu osnovu */
        .canvas-container {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .osnova-img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Pop-up (Modal) Prozor za rendere */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
            width: 90%;
            position: relative;
            text-align: left;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }

        .close-btn {
            position: absolute;
            right: 15px; top: 10px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #95a5a6;
        }

        .close-btn:hover { color: #333; }

        /* Galerija unutar pop-upa */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <header>
        <h1>Stambeno-Poslovni Objekat - Radava</h1>
        <p>Izaberite sprat i kliknite na stan za pregled 3D rendera</p>
    </header>

    <div class="floor-selector">
        <button class="btn active" onclick="prikaziEtazu(1)">1. i 2. Sprat (Stanovi A1 - A11)</button>
        <button class="btn" onclick="prikaziEtazu(2)">3. do 7. Sprat (Stanovi A1 - A11)</button>
    </div>

    <div class="canvas-container">
        
        <div id="etaza-1">
            <img src="Osnova 1.jpg" usemap="#mapa-etaza1" class="osnova-img" alt="Osnova 1-2 sprata">
            <map name="mapa-etaza1">
                <area shape="poly" coords="22,189,125,190,123,82,82,82,81,9,24,9" alt="A1" title="A1" href="javascript:void(0)" onclick="otvoriStan('A1')">
                <area shape="rect" coords="156,190,23,339" alt="A2" title="A2" href="javascript:void(0)" onclick="otvoriStan('A2')">
                <area shape="poly" coords="223,124,224,7,88,10,89,82,127,79,126,125" alt="A3" title="A3" href="javascript:void(0)" onclick="otvoriStan('A3')">
                <area shape="poly" coords="157,339,223,338,225,315,272,318,271,219,226,219,223,189,161,191" alt="A4" title="A4" href="javascript:void(0)" onclick="otvoriStan('A4')">
                <area shape="rect" coords="424,162,273,316" alt="A5" title="A5" href="javascript:void(0)" onclick="otvoriStan('A5')">
                <area shape="poly" coords="473,313,477,209,500,208,502,162,429,161,430,314" alt="A6" title="A6" href="javascript:void(0)" onclick="otvoriStan('A6')">
                <area shape="poly" coords="325,122,322,83,285,79,286,10,227,10,226,123" alt="A7" title="A7" href="javascript:void(0)" onclick="otvoriStan('A7')">
                <area shape="poly" coords="325,122,489,122,491,9,286,9,287,81,325,83" alt="A8" title="A8" href="javascript:void(0)" onclick="otvoriStan('A8')">
                <area shape="poly" coords="477,314,555,315,555,339,621,338,619,188,556,187,555,164,503,162,502,211,478,210" alt="A9" title="A9" href="javascript:void(0)" onclick="otvoriStan('A9')">
                <area shape="rect" coords="622,338,756,192" alt="A10" title="A10" href="javascript:void(0)" onclick="otvoriStan('A10')">
                <area shape="rect" coords="641,190,759,54" alt="A11" title="A11" href="javascript:void(0)" onclick="otvoriStan('A11')">
            </map>
        </div>

        <div id="etaza-2" style="display: none;">
            <img src="Osnova 2.jpg" usemap="#mapa-etaza2" class="osnova-img" alt="Osnova 3-7 sprata">
            <map name="mapa-etaza2">
                <area shape="poly" coords="18,8,18,188,116,187,118,86,79,85,76,9" alt="A1" title="A1" href="javascript:void(0)" onclick="otvoriStan('A1')">
                <area shape="rect" coords="149,192,18,341" alt="A2" title="A2" href="javascript:void(0)" onclick="otvoriStan('A2')">
                <area shape="poly" coords="279,125,277,11,79,7,80,81,119,80,121,126" alt="A3-2" title="A3-2" href="javascript:void(0)" onclick="otvoriStan('A3-2')">
                <area shape="poly" coords="152,340,217,341,217,317,265,315,268,219,219,221,216,189,151,189" alt="A4" title="A4" href="javascript:void(0)" onclick="otvoriStan('A4')">
                <area shape="rect" coords="417,162,268,315" alt="A5" title="A5" href="javascript:void(0)" onclick="otvoriStan('A5')">
                <area shape="poly" coords="470,209,496,209,496,161,420,161,419,316,471,317" alt="A6" title="A6" href="javascript:void(0)" onclick="otvoriStan('A6')">
                <area shape="rect" coords="483,7,279,123" alt="A8-2" title="A8-2" href="javascript:void(0)" onclick="otvoriStan('A8-2')">
                <area shape="poly" coords="551,339,617,340,615,190,548,190,549,160,495,160,497,210,471,210,474,315,549,319" alt="A9" title="A9" href="javascript:void(0)" onclick="otvoriStan('A9')">
                <area shape="rect" coords="753,191,617,342" alt="A10" title="A10" href="javascript:void(0)" onclick="otvoriStan('A10')">
                <area shape="poly" coords="751,9,752,190,639,188,636,92,600,93,597,9" alt="A11-2" title="A11-2" href="javascript:void(0)" onclick="otvoriStan('A11-2')">
            </map>
        </div>

    </div>

    <div id="stanModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="zatvoriModal()">&times;</span>
            <h2 id="modal-naslov">Stan</h2>
            <p>3D renderi i vizuelizacija prostora:</p>
            
            <div class="gallery" id="modal-galerija"></div>
        </div>
    </div>

    <script>
        // Prebacivanje između dvije osnove (etaže)
        function prikaziEtazu(broj) {
            const etaza1 = document.getElementById('etaza-1');
            const etaza2 = document.getElementById('etaza-2');
            const dugmad = document.querySelectorAll('.btn');

            dugmad.forEach(btn => btn.classList.remove('active'));

            if(broj === 1) {
                etaza1.style.display = 'block';
                etaza2.style.display = 'none';
                dugmad[0].classList.add('active');
            } else {
                etaza1.style.display = 'none';
                etaza2.style.display = 'block';
                dugmad[1].classList.add('active');
            }
        }

        // Baza podataka za rendere stanova
        // Ovdje mapiramo tačne nazive slika za svaki stan posebno
        const renderiStanova = {
            // Etaža 1
            "A1": ["renderi/A1_dnevna.jpg", "renderi/A1_kuhinja.jpg"],
            "A2": ["renderi/A2_dnevna.jpg"],
            "A3": ["renderi/A3_dnevna.jpg"],
            "A4": ["renderi/A4_dnevna.jpg"],
            "A5": ["renderi/A5_dnevna.jpg"],
            "A6": ["renderi/A6_dnevna.jpg"],
            "A7": ["renderi/A7_dnevna.jpg"],
            "A8": ["renderi/A8_dnevna.jpg"],
            "A9": ["renderi/A9_dnevna.jpg"],
            "A10": ["renderi/A10_dnevna.jpg"],
            "A11": ["renderi/A11_dnevna.jpg"],

            // Etaža 2 (Oznake iz tvog image-map koda)
            "A3-2": ["renderi/A3_2_dnevna.jpg"],
            "A8-2": ["renderi/A8_2_dnevna.jpg"],
            "A11-2": ["renderi/A11_2_dnevna.jpg"]
        };

        // Funkcija koja se pokreće na klik stana
        function otvoriStan(oznakaStana) {
            document.getElementById('modal-naslov').innerText = `Stambena jedinica: Stan ${oznakaStana}`;
            const galerija = document.getElementById('modal-galerija');
            
            galerija.innerHTML = '';

            // Provjeravamo da li imamo slike za taj stan u bazi iznad
            const slike = renderiStanova[oznakaStana];

            if (slike && slike.length > 0) {
                slike.forEach(izvorSlike => {
                    const img = document.createElement('img');
                    img.src = izvorSlike;
                    img.alt = `Render za stan ${oznakaStana}`;
                    
                    // U slučaju da slika još nije prenesena, stavljamo privremenu lijepu zamjenu
                    img.onerror = function() {
                        this.src = "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=400";
                    };
                    
                    galerija.appendChild(img);
                });
            } else {
                galerija.innerHTML = '<p>Renderi za ovaj stan su u pripremi.</p>';
            }

            document.getElementById('stanModal').style.display = 'flex';
        }

        function zatvoriModal() {
            document.getElementById('stanModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('stanModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
